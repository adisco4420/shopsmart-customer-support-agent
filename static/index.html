<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSmart Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --brand-light: #eff6ff;
      --surface: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --tool-bg: #f0fdf4;
      --tool-text: #166534;
      --tool-border: #bbf7d0;
      --error: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--brand);
      color: #fff;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .subtitle { font-size: .8rem; opacity: .8; margin-left: auto; }

    /* Status dot */
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(74,222,128,.3);
    }

    /* Chat container */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* Messages */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-row.assistant .avatar { background: var(--brand); color: #fff; }
    .msg-row.user .avatar { background: #6366f1; color: #fff; }

    .bubble {
      max-width: min(70%, 600px);
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: .9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.user .bubble {
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Tool indicator */
    .tool-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tool-bg);
      color: var(--tool-text);
      border: 1px solid var(--tool-border);
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      padding: 3px 10px;
      margin: 4px 0;
    }

    .tool-indicator::before { content: "⚙"; font-size: .85rem; }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Suggestions */
    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 12px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: .8rem;
      cursor: pointer;
      color: var(--brand);
      transition: background .15s, border-color .15s;
    }

    .suggestion:hover {
      background: var(--brand-light);
      border-color: var(--brand);
    }

    /* Input area */
    #input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: .9rem;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
      overflow-y: auto;
    }

    #user-input:focus { border-color: var(--brand); }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--brand-dark); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    #send-btn svg { width: 18px; height: 18px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      flex: 1;
    }

    .welcome .icon { font-size: 3rem; }
    .welcome h2 { color: var(--text); font-size: 1.3rem; }
    .welcome p { font-size: .9rem; max-width: 380px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🛍</div>
  <h1>ShopSmart Support</h1>
  <div class="status-dot"></div>
  <span class="subtitle">AI Agent • Online</span>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">💬</div>
    <h2>How can I help you today?</h2>
    <p>Ask me about your orders, products, returns, or anything else — I'm here to help.</p>
  </div>
</div>

<div id="suggestions">
  <button class="suggestion" onclick="sendSuggestion(this)">Track my order</button>
  <button class="suggestion" onclick="sendSuggestion(this)">How do I return an item?</button>
  <button class="suggestion" onclick="sendSuggestion(this)">Search for headphones</button>
  <button class="suggestion" onclick="sendSuggestion(this)">What's your refund policy?</button>
</div>

<div id="input-area">
  <textarea
    id="user-input"
    placeholder="Type a message…"
    rows="1"
    autofocus
  ></textarea>
  <button id="send-btn" onclick="submitMessage()" aria-label="Send">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const suggestionsEl = document.getElementById('suggestions');

  let sessionId = null;
  let isStreaming = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // Ctrl+Enter or Enter (without shift) to send
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitMessage();
    }
  });

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    submitMessage();
  }

  async function submitMessage() {
    const message = input.value.trim();
    if (!message || isStreaming) return;

    // Hide welcome screen and suggestions on first message
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    suggestionsEl.style.display = 'none';

    appendUserMessage(message);
    input.value = '';
    input.style.height = 'auto';
    setStreaming(true);

    const typingRow = appendTyping();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, session_id: sessionId }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${response.status}`);
      }

      typingRow.remove();
      const assistantRow = appendAssistantMessage('');
      const bubble = assistantRow.querySelector('.bubble');

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.type === 'session_id') {
            sessionId = event.session_id;
          } else if (event.type === 'text') {
            bubble.textContent += event.content;
            scrollToBottom();
          } else if (event.type === 'tool') {
            const indicator = document.createElement('div');
            indicator.className = 'tool-indicator';
            indicator.textContent = formatToolName(event.name);
            bubble.parentNode.insertBefore(indicator, bubble);
            scrollToBottom();
          } else if (event.type === 'error') {
            bubble.textContent = event.message;
            bubble.style.color = 'var(--error)';
          }
        }
      }
    } catch (err) {
      typingRow.remove();
      const errRow = appendAssistantMessage('Sorry, something went wrong. Please try again.');
      errRow.querySelector('.bubble').style.color = 'var(--error)';
      console.error(err);
    } finally {
      setStreaming(false);
    }
  }

  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar">U</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    chat.appendChild(row);
    scrollToBottom();
  }

  function appendAssistantMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = `
      <div class="avatar">A</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = `
      <div class="avatar">A</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function setStreaming(active) {
    isStreaming = active;
    sendBtn.disabled = active;
    input.disabled = active;
    input.placeholder = active ? 'Alex is thinking…' : 'Type a message…';
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatToolName(name) {
    const labels = {
      search_products: 'Searching product catalog',
      get_order_status: 'Looking up order',
      get_customer_account: 'Retrieving account',
      create_support_ticket: 'Creating support ticket',
      search_knowledge_base: 'Searching knowledge base',
      process_return_request: 'Processing return request',
    };
    return labels[name] || name.replace(/_/g, ' ');
  }
</script>
</body>
</html>
